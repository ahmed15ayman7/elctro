services:

  # # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  # postgres:
  #   image: postgres:16-alpine
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: ${POSTGRES_USER:-elctro_user}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-elctro_pass}
  #     POSTGRES_DB: ${POSTGRES_DB:-elctro_db}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5435:5435"
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-elctro_user} -d ${POSTGRES_DB:-elctro_db}"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 10s
  #   networks:
  #     - elctro_network

  # ─── Backend (Express + Prisma) ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # DATABASE_URL: postgresql://${POSTGRES_USER:-elctro_user}:${POSTGRES_PASSWORD:-elctro_pass}@postgres:5435/${POSTGRES_DB:-elctro_db}
      DATABASE_URL: ${DATABASE_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret-in-production}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-7d}
      PORT: 4000
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
    ports:
      - "4000:4000"
    networks:
      - elctro_network

  # ─── Frontend (Next.js) ───────────────────────────────────────────────────────
  frontend:
    platform: linux/amd64
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://backend:4000
        NEXT_PUBLIC_SITE_URL: ${FRONTEND_ORIGIN:-http://localhost:3000}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # Server-side env (Server Actions use this to talk to backend internally)
      API_BASE_URL: http://backend:4000
    ports:
      - "3000:3000"
    networks:
      - elctro_network

volumes:
  postgres_data:

networks:
  elctro_network:
    driver: bridge
