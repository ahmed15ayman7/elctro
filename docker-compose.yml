services:

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-elctro_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-elctro_pass}
      POSTGRES_DB: ${POSTGRES_DB:-elctro_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-elctro_user} -d ${POSTGRES_DB:-elctro_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - elctro_network

  # ─── Redis (Socket.io adapter — pub/sub across instances) ───────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - elctro_network

  # ─── Backend (Express + Prisma) ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-elctro_user}:${POSTGRES_PASSWORD:-elctro_pass}@postgres:5432/${POSTGRES_DB:-elctro_db}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret-in-production}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-7d}
      PORT: 4000
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    ports:
      - "4000:4000"
    networks:
      - elctro_network

  # ─── Frontend (Next.js) ───────────────────────────────────────────────────────
  frontend:
    platform: linux/amd64
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://backend:4000
        NEXT_PUBLIC_SITE_URL: ${FRONTEND_ORIGIN:-http://localhost:3000}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:4000}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # Server-side env (Server Actions use this to talk to backend internally)
      API_BASE_URL: http://backend:4000
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-7d}
    ports:
      - "3000:3000"
    networks:
      - elctro_network

volumes:
  postgres_data:
  redis_data:

networks:
  elctro_network:
    driver: bridge
